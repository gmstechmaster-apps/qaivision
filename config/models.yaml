# Model configuration for the Planner (coding) agent and Vision agent.
#
# This file is read fresh on every run — switching models never requires a
# code change or rebuild. You can also override per-run without touching
# this file:
#   npm run run -- --env dev --site <site> --scenario smoke --vision-model qwen3-vl:32b
#   AIQA_VISION_MODEL=qwen3-vl:32b npm run run -- --env dev --site <site> --scenario smoke
#
# Spec-recommended models are qwen3-coder:30b (planner, MoE, ~3B active
# params — much lighter than a dense model of the same total size) and
# qwen3-vl:32b (vision). Defaults below are smaller local models sized for
# a modest disk/VRAM machine; point planner.model / vision.model at the
# recommended models on a machine with enough headroom and nothing else changes.

ollama:
  host: http://localhost:11434
  requestTimeoutMs: 120000

planner:
  # Recommended: qwen3-coder:32b
  model: qwen2.5-coder:3b
  temperature: 0.1

vision:
  # Recommended: qwen3-vl:32b
  model: qwen3-vl:8b
  temperature: 0.1
